services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dos_amigos}
      POSTGRES_USER: ${POSTGRES_USER:-dos_amigos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dos_amigos} -d ${POSTGRES_DB:-dos_amigos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  core:
    build: .
    env_file: [.env]
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn apps.core.app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

volumes:
  postgres_data:
