name: dos-amigos-core

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    mem_limit: 384m
    pids_limit: 128
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - backend

  core:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}"
    ports:
      - "127.0.0.1:${API_PORT:-8090}:8000"
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - alembic upgrade head && exec uvicorn apps.core.app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/health/live", timeout=3)
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    init: true
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    pids_limit: 128
    tmpfs:
      - /tmp:size=64m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
